# ── IntellexIA MCP (uvicorn 127.0.0.1:8001) ──────────────────────────────
# Colar DENTRO do bloco `server { listen 443 ... rs-dev.intellexia.com.br }`.
# O prefixo público /mcp é removido antes de chegar ao backend (que serve na raiz).

location = /mcp {
    proxy_pass http://127.0.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 3600;
    proxy_buffering off;
}

location /mcp/ {
    proxy_pass http://127.0.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 3600;
    proxy_buffering off;
}

# Discovery OAuth (RFC 8414 / RFC 9728) — precisa viver na raiz do domínio
location = /.well-known/oauth-authorization-server/mcp {
    proxy_pass http://127.0.0.1:8001/.well-known/oauth-authorization-server;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /.well-known/oauth-authorization-server {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
# ── fim IntellexIA MCP ────────────────────────────────────────────────────
