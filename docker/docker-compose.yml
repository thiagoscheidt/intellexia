version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: intellexia-mysql
    ports:
      - "6336:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: intellexia
      MYSQL_USER: intellexia
      MYSQL_PASSWORD: intellexia_password_123
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - intellexia-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: intellexia-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/production.yaml
    networks:
      - intellexia-network
    environment:
      QDRANT_API_KEY: qdrant_api_key_123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      timeout: 5s
      retries: 5
      interval: 10s
    restart: unless-stopped

  # Meilisearch Search Engine
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: intellexia-meilisearch
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - intellexia-network
    environment:
      MEILI_MASTER_KEY: meilisearch_master_key_123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      timeout: 5s
      retries: 5
      interval: 10s
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  qdrant_data:
    driver: local
  meili_data:
    driver: local

networks:
  intellexia-network:
    driver: bridge
