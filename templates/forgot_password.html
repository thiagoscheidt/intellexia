<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IntellexIA | Esqueci a senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-[#0A0B0F] text-slate-100 antialiased">
    <div class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">
        <div
            class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(148,163,184,0.08),transparent_35%),radial-gradient(circle_at_80%_70%,rgba(99,102,241,0.12),transparent_40%)]">
        </div>

        <main
            class="relative z-10 w-full max-w-md rounded-3xl border border-slate-800 bg-[#11131A] shadow-[0_24px_80px_rgba(0,0,0,0.45)]">
            <div class="border-b border-slate-800 px-8 py-7 text-center">
                <img src="{{ url_for('static', filename='assets/img/logo_maior.png') }}" alt="IntellexIA"
                    class="mx-auto h-16 w-auto object-contain">
                <h1 class="mt-4 text-xl font-semibold tracking-tight text-white">Recuperar senha</h1>
                <p class="mt-1 text-sm text-slate-400">Informe seu email para receber instruções.</p>
            </div>

            <div class="px-8 py-7">
                <div id="alert" class="mb-4 hidden rounded-xl border px-4 py-3 text-sm"></div>

                <form id="forgot-form" class="space-y-4" novalidate>
                    <div>
                        <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">Email</label>
                        <input id="email" name="email" type="email" required placeholder="voce@empresa.com"
                            autocomplete="email"
                            class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                    </div>

                    <button id="submit-btn" type="submit"
                        class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 disabled:cursor-not-allowed disabled:opacity-70">
                        <span id="submit-spinner"
                            class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
                        <span id="submit-text">Enviar instruções</span>
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-slate-400">
                    Lembrou da senha?
                    <a href="{{ url_for('auth.login') }}"
                        class="font-semibold text-indigo-300 hover:text-indigo-200">Voltar ao login</a>
                </p>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('forgot-form');
        const alertBox = document.getElementById('alert');
        const submitBtn = document.getElementById('submit-btn');
        const submitSpinner = document.getElementById('submit-spinner');
        const submitText = document.getElementById('submit-text');

        function showAlert(message, type) {
            const isSuccess = type === 'success';
            alertBox.className = `mb-4 rounded-xl border px-4 py-3 text-sm ${isSuccess
                ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300'
                : 'border-rose-500/30 bg-rose-500/10 text-rose-300'}`;
            alertBox.textContent = message;
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitSpinner.classList.toggle('hidden', !loading);
            submitText.textContent = loading ? 'Enviando...' : 'Enviar instruções';
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            alertBox.classList.add('hidden');

            const formData = new FormData(form);
            setLoading(true);

            try {
                const response = await fetch("{{ url_for('auth.forgot_password_post') }}", {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                const data = await response.json();
                showAlert(
                    data.message || (data.success ? 'Solicitação enviada.' : 'Não foi possível processar sua solicitação.'),
                    data.success ? 'success' : 'error'
                );
            } catch (error) {
                showAlert('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
