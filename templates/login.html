<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IntellexIA | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-[#0A0B0F] text-slate-100 antialiased">
    <div class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">
        <div
            class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(148,163,184,0.08),transparent_35%),radial-gradient(circle_at_80%_70%,rgba(99,102,241,0.12),transparent_40%)]">
        </div>

        <main
            class="relative z-10 w-full max-w-md rounded-3xl border border-slate-800 bg-[#11131A] shadow-[0_24px_80px_rgba(0,0,0,0.45)]">
            <div class="border-b border-slate-800 px-8 py-7 text-center">
                <img src="{{ url_for('static', filename='assets/img/logo_maior.png') }}" alt="IntellexIA"
                    class="mx-auto h-16 w-auto object-contain">
                <h1 class="mt-4 text-xl font-semibold tracking-tight text-white">Entrar na plataforma</h1>
                <p class="mt-1 text-sm text-slate-400">Acesse sua conta para continuar.</p>
            </div>

            <div class="px-8 py-7">
                <div id="alert" class="mb-4 hidden rounded-xl border px-4 py-3 text-sm"></div>

                <form id="login-form" class="space-y-4" novalidate>
                    <div>
                        <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">Email</label>
                        <div class="relative">
                            <span
                                class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-500">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input id="email" name="email" type="email" required placeholder="voce@empresa.com"
                                autocomplete="email"
                                class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] py-2.5 pl-10 pr-3 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="mb-1.5 block text-sm font-medium text-slate-300">Senha</label>
                        <div class="relative">
                            <span
                                class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-500">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input id="password" name="password" type="password" required placeholder="••••••••"
                                autocomplete="current-password"
                                class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] py-2.5 pl-10 pr-10 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                            <button type="button" id="toggle-password"
                                class="absolute inset-y-0 right-3 text-slate-500 transition hover:text-indigo-300"
                                aria-label="Mostrar ou ocultar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 text-slate-400">
                            <input id="remember" name="remember" type="checkbox"
                                class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-indigo-500 focus:ring-indigo-500">
                            Lembrar de mim
                        </label>
                        <a href="{{ url_for('auth.forgot_password') }}"
                            class="font-medium text-indigo-300 hover:text-indigo-200">Esqueci a senha</a>
                    </div>

                    <button id="submit-btn" type="submit"
                        class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 disabled:cursor-not-allowed disabled:opacity-70">
                        <span id="submit-spinner"
                            class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
                        <span id="submit-text">Entrar</span>
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-slate-400">
                    Ainda não tem conta?
                    <a href="{{ url_for('auth.register') }}"
                        class="font-semibold text-indigo-300 hover:text-indigo-200">Criar conta</a>
                </p>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const alertBox = document.getElementById('alert');
        const submitBtn = document.getElementById('submit-btn');
        const submitSpinner = document.getElementById('submit-spinner');
        const submitText = document.getElementById('submit-text');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('toggle-password');

        function showAlert(message, type) {
            const isSuccess = type === 'success';
            alertBox.className = `mb-4 rounded-xl border px-4 py-3 text-sm ${isSuccess
                ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300'
                : 'border-rose-500/30 bg-rose-500/10 text-rose-300'}`;
            alertBox.textContent = message;
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitSpinner.classList.toggle('hidden', !loading);
            submitText.textContent = loading ? 'Entrando...' : 'Entrar';
        }

        togglePassword.addEventListener('click', function () {
            const hidden = passwordInput.type === 'password';
            passwordInput.type = hidden ? 'text' : 'password';
            togglePassword.innerHTML = hidden ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
        });

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            alertBox.classList.add('hidden');

            const formData = new FormData(form);
            setLoading(true);

            try {
                const response = await fetch("{{ url_for('auth.login_post') }}", {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                const data = await response.json();
                if (data.success) {
                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || "{{ url_for('dashboard.dashboard') }}";
                    }, 400);
                    return;
                }

                showAlert(data.message || 'Não foi possível realizar login.', 'error');
            } catch (error) {
                showAlert('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
