<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IntellexIA | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-[#0A0B0F] text-slate-100 antialiased">
    <div class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">
        <div
            class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_15%_25%,rgba(148,163,184,0.08),transparent_35%),radial-gradient(circle_at_80%_75%,rgba(99,102,241,0.12),transparent_40%)]">
        </div>

        <main
            class="relative z-10 w-full max-w-3xl rounded-3xl border border-slate-800 bg-[#11131A] shadow-[0_24px_80px_rgba(0,0,0,0.45)]">
            <div class="grid md:grid-cols-5">
                <aside class="md:col-span-2 border-b border-slate-800 p-8 md:border-b-0 md:border-r">
                    <img src="{{ url_for('static', filename='assets/img/logo_maior.png') }}" alt="IntellexIA"
                        class="h-14 w-auto object-contain">
                    <h1 class="mt-6 text-2xl font-semibold text-white">Crie sua conta</h1>
                    <p class="mt-2 text-sm leading-relaxed text-slate-400">Configure seu escritório em poucos passos e
                        comece a gerenciar seus casos com inteligência.</p>

                    <div class="mt-8 space-y-4 text-sm text-slate-400">
                        <div class="rounded-xl border border-slate-800 bg-[#0B0D12] px-4 py-3">Cadastro rápido de
                            escritório e usuário administrador.</div>
                        <div class="rounded-xl border border-slate-800 bg-[#0B0D12] px-4 py-3">Acesso imediato às
                            funcionalidades da plataforma.</div>
                    </div>
                </aside>

                <section class="md:col-span-3 p-8">
                    <div id="alert" class="mb-4 hidden rounded-xl border px-4 py-3 text-sm"></div>

                    <form id="register-form" class="space-y-6" novalidate>
                        <div>
                            <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-indigo-300">Dados do
                                usuário</h2>
                            <div class="grid gap-4 md:grid-cols-2">
                                <div class="md:col-span-2">
                                    <label for="full_name" class="mb-1.5 block text-sm font-medium text-slate-300">Nome
                                        completo *</label>
                                    <input id="full_name" name="full_name" type="text" required
                                        placeholder="Ex: João Silva Santos"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <div>
                                    <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">Email
                                        *</label>
                                    <input id="email" name="email" type="email" required placeholder="voce@empresa.com"
                                        autocomplete="email"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <div>
                                    <label for="oab_number"
                                        class="mb-1.5 block text-sm font-medium text-slate-300">OAB</label>
                                    <input id="oab_number" name="oab_number" type="text" placeholder="Ex: SP 123456"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <div>
                                    <label for="password" class="mb-1.5 block text-sm font-medium text-slate-300">Senha
                                        *</label>
                                    <input id="password" name="password" type="password" minlength="6" required
                                        placeholder="Mínimo 6 caracteres" autocomplete="new-password"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <div>
                                    <label for="password_confirm"
                                        class="mb-1.5 block text-sm font-medium text-slate-300">Confirmar senha
                                        *</label>
                                    <input id="password_confirm" name="password_confirm" type="password" minlength="6"
                                        required placeholder="Repita a senha" autocomplete="new-password"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                            </div>
                        </div>

                        <div>
                            <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-indigo-300">Dados do
                                escritório</h2>
                            <div class="grid gap-4 md:grid-cols-2">
                                <div class="md:col-span-2">
                                    <label for="law_firm_name"
                                        class="mb-1.5 block text-sm font-medium text-slate-300">Nome do escritório
                                        *</label>
                                    <input id="law_firm_name" name="law_firm_name" type="text" required
                                        placeholder="Ex: Silva & Associados"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <div>
                                    <label for="law_firm_cnpj"
                                        class="mb-1.5 block text-sm font-medium text-slate-300">CNPJ *</label>
                                    <input id="law_firm_cnpj" name="law_firm_cnpj" type="text" required
                                        placeholder="00.000.000/0000-00"
                                        class="w-full rounded-xl border border-slate-700 bg-[#0B0D12] px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20">
                                </div>
                                <label class="inline-flex items-center gap-2 self-end text-sm text-slate-400">
                                    <input id="terms" name="terms" type="checkbox" required
                                        class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-indigo-500 focus:ring-indigo-500">
                                    Aceito os termos de uso
                                </label>
                            </div>
                        </div>

                        <button id="submit-btn" type="submit"
                            class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 disabled:cursor-not-allowed disabled:opacity-70">
                            <span id="submit-spinner"
                                class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
                            <span id="submit-text">Criar conta</span>
                        </button>
                    </form>

                    <p class="mt-6 text-center text-sm text-slate-400">
                        Já possui conta?
                        <a href="{{ url_for('auth.login') }}"
                            class="font-semibold text-indigo-300 hover:text-indigo-200">Fazer login</a>
                    </p>
                </section>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const alertBox = document.getElementById('alert');
        const submitBtn = document.getElementById('submit-btn');
        const submitSpinner = document.getElementById('submit-spinner');
        const submitText = document.getElementById('submit-text');

        function showAlert(message, type) {
            const isSuccess = type === 'success';
            alertBox.className = `mb-4 rounded-xl border px-4 py-3 text-sm ${isSuccess
                ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300'
                : 'border-rose-500/30 bg-rose-500/10 text-rose-300'}`;
            alertBox.textContent = message;
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitSpinner.classList.toggle('hidden', !loading);
            submitText.textContent = loading ? 'Criando conta...' : 'Criar conta';
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            alertBox.classList.add('hidden');

            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const terms = document.getElementById('terms').checked;

            if (password !== passwordConfirm) {
                showAlert('As senhas não coincidem.', 'error');
                return;
            }

            if (!terms) {
                showAlert('Você deve aceitar os termos de uso.', 'error');
                return;
            }

            const formData = new FormData(form);
            setLoading(true);

            try {
                const response = await fetch("{{ url_for('auth.register_post') }}", {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                const data = await response.json();
                if (data.success) {
                    showAlert(data.message || 'Conta criada com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = "{{ url_for('auth.login') }}";
                    }, 700);
                    return;
                }

                showAlert(data.message || 'Não foi possível criar a conta.', 'error');
            } catch (error) {
                showAlert('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
